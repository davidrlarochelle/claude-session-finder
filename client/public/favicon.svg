<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Claude Session Finder">
  <rect width="32" height="32" rx="7" fill="#D97757"/>
  <!-- Magnifying glass = "find" -->
  <g fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="14" cy="14" r="7"/>
    <line x1="19.1" y1="19.1" x2="24.5" y2="24.5"/>
  </g>
  <!-- Three dots inside the lens = a conversation being searched -->
  <g fill="#ffffff">
    <circle cx="11" cy="14" r="1.15"/>
    <circle cx="14" cy="14" r="1.15"/>
    <circle cx="17" cy="14" r="1.15"/>
  </g>
</svg>
