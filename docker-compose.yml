services:
  app:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run build && npm start"
    ports:
      - "37702:37702"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - client_dist:/app/client/dist
      - session_cache:/app/.cache
      - ${HOME}/.claude/projects:/root/.claude/projects:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:37702/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  node_modules:
  client_dist:
  session_cache:
